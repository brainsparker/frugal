name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Developer Certificate of Origin sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r commit; do
            if ! git log -1 --pretty=%B "$commit" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by in commit: $commit"
              missing=1
            fi
          done < <(git rev-list "${BASE_SHA}..${HEAD_SHA}")

          if [ "$missing" -ne 0 ]; then
            echo "One or more commits are missing DCO sign-off."
            echo "Fix with: git rebase --signoff <base-branch>"
            exit 1
          fi
